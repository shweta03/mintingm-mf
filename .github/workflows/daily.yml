name: Daily AMFI Data Refresh

on:
  schedule:
    - cron: '30 19 * * 1-5'   # 19:30 UTC = 1:00 AM IST — after AMFI publishes at 11 PM IST
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install libraries
        run: pip install requests yfinance pandas numpy

      - name: Fetch AMFI data + Market Breadth
        timeout-minutes: 22
        run: python refresh_data.py

      - name: Commit data files
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data.json breadth_data.json vix_data.json || true
          git diff --staged --quiet || git commit -m "Daily data refresh - $(date +%Y-%m-%d)"
          git push
